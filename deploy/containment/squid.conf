# 8kEdu cloud containment — egress allowlist gateway.
#
# The contained analyze step reaches the internet ONLY through this proxy, and this
# proxy permits exactly one destination: OpenRouter (the cloud inference endpoint) over
# TLS. Every other CONNECT is denied at L7 and written to the audit log. This is the
# cloud analog of the OpenShell/scoutclaw egress policy in claw-agent/policies/8kedu.yaml
# — same guarantee (deny-by-default egress + audit), different mechanism (Docker + squid).
#
# Persistence (Supabase) is intentionally NOT allowlisted: the contained reasoner only
# talks to inference and writes concepts.json to a mounted volume; the host persists.

http_port 3128
pid_filename /tmp/squid.pid
cache deny all
cache_log /dev/null

# ---- allowlist: only OpenRouter, only over TLS ----
acl openrouter dstdomain .openrouter.ai
acl SSL_ports  port 443
acl CONNECT    method CONNECT

http_access allow CONNECT openrouter SSL_ports
http_access deny all                       # everything else → TCP_DENIED (logged below)

# ---- tamper-evident-ish audit trail: one JSON line per connection decision ----
# %Ss = TCP_TUNNEL (allowed) | TCP_DENIED (blocked);  %ru = dst host:port for CONNECT
logformat ocsf {"time":"%tl","src_ip":"%>a","dst":"%ru","method":"%rm","action":"%Ss","http_status":%>Hs,"resp_bytes":%<st}
access_log stdio:/var/log/squid/access.log ocsf
